<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>

<style>

body{
  font-family: Arial;
  margin:0;
}

/* Header */
header{
  background:#333;
  color:white;
  text-align:center;
  padding:20px;
}

/* Navbar */
nav{
  display:flex;
  justify-content:center;
  background:#555;
}

nav a{
  color:white;
  padding:10px 20px;
  text-decoration:none;
}

/* Container */
.container{
  display:flex;
  flex-wrap:wrap;
  padding:20px;
}

/* Cards */
.card{
  background:#f4f4f4;
  margin:10px;
  padding:20px;
  flex:1 1 300px;
  border-radius:5px;
}

/* Footer */
footer{
  background:#333;
  color:white;
  text-align:center;
  padding:15px;
}

/* Mobile Responsive */
@media (max-width:600px){

  nav{
    flex-direction:column;
    align-items:center;
  }

}

</style>
</head>

<body>

<header>
<h1>My Portfolio</h1>
<p>Web Developer</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="card">
<h2>Project 1</h2>
<p>This is my first project</p>
</div>

<div class="card">
<h2>Project 2</h2>
<p>This is my second project</p>
</div>

<div class="card">
<h2>Project 3</h2>
<p>This is my third project</p>
</div>

</div>

<footer>
<p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
