<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>

<style>

body{
  font-family: Arial;
  margin:0;
}

header{
  background:#333;
  color:white;
  text-align:center;
  padding:20px;
}

nav{
  display:flex;
  justify-content:center;
  background:#555;
}

nav a{
  color:white;
  padding:10px 20px;
  text-decoration:none;
}

.container{
  display:flex;
  flex-wrap:wrap;
  padding:20px;
}

.card{
  background:#f4f4f4;
  margin:10px;
  padding:20px;
  flex:1 1 300px;
  border-radius:5px;
}

footer{
  background:#333;
  color:white;
  text-align:center;
  padding:15px;
}

/* Button Style */
button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  background:#ff6600;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

@media (max-width:600px){
  nav{
    flex-direction:column;
    align-items:center;
  }
}

</style>
</head>

<body>

<header>
<h1>My Portfolio</h1>
<p>Web Developer</p>

<!-- TTS Buttons -->
<button onclick="speakText()">🔊 Speak</button>
<button onclick="stopText()">⛔ Stop</button>

</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="card">
<h2>Project 1</h2>
<p>This is my first project</p>
</div>

<div class="card">
<h2>Project 2</h2>
<p>This is my second project</p>
</div>

<div class="card">
<h2>Project 3</h2>
<p>This is my third project</p>
</div>

</div>

<footer>
<p>© 2026 My Portfolio</p>
</footer>

<script>

// Speak Function
function speakText() {

  let text = document.querySelector(".container").innerText;

  let speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US"; 

  window.speechSynthesis.speak(speech);
}

// Stop Function
function stopText() {
  window.speechSynthesis.cancel();
}

</script>

</body>
</html>
